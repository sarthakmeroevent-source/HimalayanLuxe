<!doctype html>
<html class="scroll-smooth" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta
      name="google-site-verification"
      content="_i9hj0NIVAJdqMR_JEyJO5pCOv1O6DAuhZWh1yERJ2I"
    />

    <!-- SEO Meta Tags -->
    <title>Himalayan Luxe | Luxury Event Planning in Nepal</title>
    <meta
      name="description"
      content="Himalayan Luxe — Nepal's premier luxury event planning company. We craft extraordinary destination weddings, corporate events, and celebrations amidst the breathtaking Himalayan landscapes."
    />
    <meta
      name="keywords"
      content="Himalayan Luxe, luxury events Nepal, destination wedding Nepal, event planning Nepal, luxury wedding planner, Himalayan wedding, Nepal events, MeroEvent"
    />
    <meta name="author" content="Himalayan Luxe" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://himalayanluxe.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://himalayanluxe.com/" />
    <meta
      property="og:title"
      content="Himalayan Luxe | Luxury Event Planning in Nepal"
    />
    <meta
      property="og:description"
      content="Nepal's premier luxury event planning company. Crafting extraordinary destination weddings and celebrations amidst breathtaking Himalayan landscapes."
    />
    <meta
      property="og:image"
      content="https://himalayanluxe.com/FUll-logo.png"
    />
    <meta property="og:site_name" content="Himalayan Luxe" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Himalayan Luxe | Luxury Event Planning in Nepal"
    />
    <meta
      name="twitter:description"
      content="Nepal's premier luxury event planning company. Crafting extraordinary destination weddings and celebrations amidst breathtaking Himalayan landscapes."
    />
    <meta
      name="twitter:image"
      content="https://himalayanluxe.com/FUll-logo.png"
    />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EventPlanningBusiness",
        "name": "Himalayan Luxe",
        "alternateName": "HimalayanLuxe",
        "url": "https://himalayanluxe.com",
        "logo": "https://himalayanluxe.com/FUll-logo.svg",
        "description": "Nepal's premier luxury event planning company specializing in destination weddings, corporate events, and celebrations in the Himalayas.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "NP",
          "addressLocality": "Kathmandu"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Nepal"
        },
        "sameAs": []
      }
    </script>

    <!-- Sitelinks Search & Navigation -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Himalayan Luxe",
        "url": "https://himalayanluxe.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://himalayanluxe.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SiteNavigationElement",
            "name": "Destinations",
            "description": "Explore luxury event destinations across Nepal",
            "url": "https://himalayanluxe.com/destinations"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Services",
            "description": "Premium event planning services by Himalayan Luxe",
            "url": "https://himalayanluxe.com/services"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Gallery",
            "description": "Browse our portfolio of luxury events in Nepal",
            "url": "https://himalayanluxe.com/gallery"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "About Us",
            "description": "Learn about Himalayan Luxe and our story",
            "url": "https://himalayanluxe.com/about"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Contact Us",
            "description": "Get in touch with Himalayan Luxe for event planning",
            "url": "https://himalayanluxe.com/contact"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Experience",
            "description": "Discover the Himalayan Luxe experience",
            "url": "https://himalayanluxe.com/experience"
          }
        ]
      }
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/FUll-logo.png" />
    <link rel="icon" type="image/svg+xml" href="/FUll-logo.svg?v=2" />
    <link rel="shortcut icon" type="image/png" href="/FUll-logo.png" />
    <link rel="apple-touch-icon" href="/FUll-logo.png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dm+Sans:wght@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
  </head>

  <body class="selection:bg-gold/30 grainy-texture">

  </body>
</html>
